name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Changelog fragment check (PRs)
        if: github.event_name == 'pull_request'
        run: scripts/changelog/check_changelog_fragment.sh "${{ github.base_ref }}"

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all --all-features

  parity:
    name: Parity (vm vs llvm)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18 lld-18

      - name: Parity check (tests/parity + examples/basics, extended)
        run: scripts/check_parity.sh --extended tests/parity examples/basics
